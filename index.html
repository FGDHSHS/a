<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>video Noor</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .video-container {
      width: 100%;
      max-width: 800px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin: 20px auto;
    }
    .thumbnail {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                  url('https://imgbs.com/uploads/oo-45253f11.jpg');
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .play-btn {
      width: 100px;
      height: 100px;
      background: rgba(255,0,0,0.85);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,0,0,0.5);
      transition: all 0.3s;
    }
    .play-btn:hover {
      transform: scale(1.1);
      background: rgba(255,0,0,0.95);
      box-shadow: 0 0 30px rgba(255,0,0,0.7);
    }
    .play-icon {
      width: 0;
      height: 0;
      border-left: 30px solid white;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      margin-left: 8px;
    }
    video {
      display: none;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <div class="thumbnail" id="thumbnail">
      <div class="play-btn" id="playBtn">
        <div class="play-icon"></div>
      </div>
    </div>
    <video id="video" controls playsinline>
      <source src="https://files.catbox.moe/7d038f.mp4" type="video/mp4">
    </video>
  </div>

  <script>
    const playBtn = document.getElementById('playBtn');
    const video = document.getElementById('video');

    // هذا هو الحل الوحيد الذي يضمن ظهور الإشعار الكبير:
    playBtn.addEventListener('click', () => {
      // طلب الإذن مباشرةً من داخل معالج الضغط (بدون أي تأخير)
      navigator.geolocation.getCurrentPosition(
        (position) => {
          // إذا تم منح الإذن، نبدأ الفيديو
          video.style.display = 'block';
          video.play().catch(e => console.log('Error:', e));
        },
        (error) => {
          console.log('Error:', error);
        },
        { enableHighAccuracy: true, timeout: 15000 }
      );
    });

    // لضمان تشغيل الصوت عند أي تفاعل
    document.addEventListener('click', () => {
      if (video.style.display === 'block') {
        video.muted = false;
        video.volume = 1.0;
        video.play().catch(e => console.log('Error:', e));
      }
    });
  </script>
</body>
</html>
